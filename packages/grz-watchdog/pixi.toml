[workspace]
authors = ["Travis Wrightsman <travis.wrightsman@uni-tuebingen.de>", "Till Hartmann <till.hartmann@bih-charite.de>"]
channels = ["conda-forge", "bioconda"]
name = "grz-watchdog"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
# The `uv pip install` delegates the Python workspace wiring to uv natively
setup = { cmd = "uv pip install --python \"$CONDA_PREFIX\" -e ../grz-pydantic-models -e ../grz-common -e ../grz-db -e ../grz-cli -e ../grzctl -e ../grz-check" }

# Make your process tasks depend on setup so it ensures the packages are linked
process-single = { cmd = "bash ./container_utils/scripts/process-single", depends-on = ["setup"] }
process-batch = { cmd = "bash ./container_utils/scripts/process-batch", depends-on = ["setup"] }
daemon = { cmd = "bash ./container_utils/scripts/daemon", depends-on = ["setup"] }
test = { cmd = "pytest", depends-on = ["setup"] }

[dependencies]
snakemake = ">=9.13.2,<10"
snakefmt = ">=1,<2"
#snakemake-storage-plugin-s3 = ">=0.3.6,<0.4"
#snakemake-executor-plugin-slurm = ">=1.8.0,<2"
conda = ">=25.9.0,<26"
git = ">=2.51.0,<3"
jq = ">=1.8.1,<2"
ripgrep = ">=14.1.1,<15"
nextflow = ">=25.4.8,<26"
s5cmd = ">=2.3.0,<3"
minio-client = ">=2025.8.13.8.35.41,<2026"
#sqlite = ">=3.50.4,<4"
#pytest = ">=8.4.2,<9"
#requests = ">=2.32.5,<3"
coin-or-cbc = ">=2.10.12,<3"
uv = ">=0.11.15"

