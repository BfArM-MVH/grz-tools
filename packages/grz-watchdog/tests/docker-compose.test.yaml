services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - ./minio-setup:/config
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_TEST_USER_ACCESS_KEY=Gd4G0VqhHTmi28twgsmF
      - MINIO_TEST_USER_SECRET_KEY=KEx8ABzui36NhyXbiQwYXxps3HahqD7EKL54v65f
    entrypoint: /config/entrypoint-minio.sh
    command: /usr/bin/minio server /data --console-address :9001
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/setup_complete && mc ready local --exit-code"]
      interval: 5s
      timeout: 5s
      retries: 30

  grz-watchdog:
    build:
      # context must be monorepo root!
      context: ../../..
      dockerfile: ./packages/grz-watchdog/tests/Dockerfile.test
    container_name: grz-watchdog-test-runner
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./config:/config
    working_dir: /workdir
    environment:
      - GRZ_S3__ENDPOINT_URL=http://minio:9000
      - GRZ_S3__ACCESS_KEY=minioadmin
      - GRZ_S3__SECRET=minioadmin
      - GRZ_KEYS__GRZ_PRIVATE_KEY_PASSPHRASE=test
    # overriding entrypoint here to keep this service running, ugly workaround
    entrypoint: /bin/sleep
    command: infinity

volumes:
  minio_data:
